# ==========================================================================
# CRE SECRETS — MemoryVault Agent Protocol
# ==========================================================================
# Maps secret names (used in workflow code via runtime.getSecret({ id: ... }))
# to environment variable names (loaded from .env).
#
# ⚠️ CRE Known Issue: env var name must NOT be a substring/prefix of the
#    secret YAML key. Workaround: suffix env vars with _VAR.
#
# Usage in workflow code:
#   const key = runtime.getSecret({ id: 'GEMINI_API_KEY' }).result()
#
# For ConfidentialHTTPClient vault secrets:
#   vaultDonSecrets: [{ key: 'dataApiKey', owner: config.owner }]

secretsNames:
  # ── Gemini LLM (Risk Analysis Skill) ──
  GEMINI_API_KEY:
    - GEMINI_API_KEY_VAR

  # ── AWS S3 (MemoryVault episodic storage) ──
  AWS_ACCESS_KEY_ID:
    - AWS_ACCESS_KEY_ID_VAR
  AWS_SECRET_ACCESS_KEY:
    - AWS_SECRET_ACCESS_KEY_VAR

  # ── Mock Data API (ConfidentialHTTPClient) ──
  dataApiKey:
    - DATA_API_KEY_VAR

  # ── AES-GCM Encryption (MemoryVault blobs) ──
  AES_KEY:
    - AES_KEY_VAR

  # ── Pushover Notifications (Integrity Checker alerts) ──
  PUSHOVER_USER_KEY:
    - PUSHOVER_USER_KEY_VAR
  PUSHOVER_API_TOKEN:
    - PUSHOVER_API_TOKEN_VAR

  # ── Crypto News Alpha (RapidAPI — crypto-news51) ──
  RAPIDAPI_KEY:
    - RAPIDAPI_KEY_VAR
