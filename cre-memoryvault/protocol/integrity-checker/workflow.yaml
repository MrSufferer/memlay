# ==========================================================================
# CRE WORKFLOW SETTINGS — integrity-checker (MemoryVault tampering detection)
# ==========================================================================
# Cron-triggered protocol workflow that periodically reads all agent entries
# from S3, recomputes hashes, verifies against MemoryRegistry on-chain,
# and sends a Pushover alert if any hash mismatch is detected.
#
# Test:
#   cre workflow simulate protocol/integrity-checker \
#     --target staging-settings

# ==========================================================================
staging-settings:
  user-workflow:
    workflow-name: "memoryvault-integrity-checker-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../../secrets.yaml"

# ==========================================================================
production-settings:
  user-workflow:
    workflow-name: "memoryvault-integrity-checker-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../../secrets.yaml"
