# ==========================================================================
# CRE WORKFLOW SETTINGS — memory-writer (MemoryVault commit)
# ==========================================================================
# HTTP-triggered protocol workflow that commits agent reasoning to
# MemoryVault (S3 encrypted + on-chain hash to MemoryRegistry.sol).
#
# Test:
#   cre workflow simulate protocol/memory-writer \
#     --target staging-settings \
#     --http-payload '{"agentId":"agent-alpha-01","entryKey":"lp-entry-test","entryData":{"action":"lp-entry","toolId":"uniswap-v3-lp","reasoning":"test"}}'

# ==========================================================================
staging-settings:
  user-workflow:
    workflow-name: "memoryvault-memory-writer-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../../secrets.yaml"

# ==========================================================================
production-settings:
  user-workflow:
    workflow-name: "memoryvault-memory-writer-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../../secrets.yaml"
